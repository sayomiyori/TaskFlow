name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_CHANNEL_HOST: redis://127.0.0.1:6379/1
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672/
      RABBITMQ_EXCHANGE: task_events

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict (critical modules)
        run: mypy apps/events apps/realtime apps/tasks/signals.py --strict

      - name: Pytest with coverage XML
        run: pytest --cov=apps --cov-report=xml

      # Codecov requires a repository upload token for pushes to protected branches (e.g. main).
      # Add secret CODECOV_TOKEN in: Repo Settings → Secrets and variables → Actions.
      # (Do not use `if: secrets.X == ''` — GitHub treats that comparison as always false.)
      - name: Check Codecov token
        id: codecov_token
        run: |
          if [ -z "${{ secrets.CODECOV_TOKEN }}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Codecov::Upload skipped — add repository secret CODECOV_TOKEN (https://docs.codecov.com/docs/codecov-tokens) for reports on main."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov
        if: steps.codecov_token.outputs.present == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Docker build Django image
        run: docker build -t taskflow-django-ci .

      - name: Docker build Notification image
        run: docker build -t taskflow-notify-ci ./notification_service
